<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Interactive map of WindCharge stations across India. Find the nearest wind-powered charging station with real-time availability.">
    <title>Station Map – WindCharge Station Finder</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌬️</text></svg>">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar__logo">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="24" cy="24" r="22" fill="#d5f5e3" />
                    <path d="M24 8 L24 40 M24 16 L16 26 M24 16 L32 26" stroke="#27ae60" stroke-width="3"
                        stroke-linecap="round" stroke-linejoin="round" />
                    <circle cx="24" cy="16" r="3" fill="#27ae60" />
                </svg>
                WindCharge
            </a>
            <ul class="navbar__links">
                <li><a href="index.html">Home</a></li>
                <li><a href="map.html">Station Map</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <button class="hamburger" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- Map Page -->
    <div class="map-page">
        <div class="map-controls">
            <h1 class="map-controls__title">⚡ Station Locator</h1>

            <select id="regionSelector" aria-label="Select Region">
                <option value="All States">All States</option>
                <option value="Tamil Nadu">Tamil Nadu</option>
                <option value="Karnataka">Karnataka</option>
                <option value="Kerala">Kerala</option>
                <option value="Maharashtra">Maharashtra</option>
                <option value="Delhi">Delhi</option>
                <option value="Rajasthan">Rajasthan</option>
            </select>

            <div class="map-legend">
                <div class="map-legend__item">
                    <div class="map-legend__dot map-legend__dot--available"></div> Available
                </div>
                <div class="map-legend__item">
                    <div class="map-legend__dot map-legend__dot--busy"></div> Busy
                </div>
                <div class="map-legend__item">
                    <div class="map-legend__dot map-legend__dot--offline"></div> Offline
                </div>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <!-- Wind Monitoring Widget -->
    <div class="wind-widget" id="windWidget">
        <div class="wind-widget__header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path
                    d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2" />
            </svg>
            Wind Monitor
        </div>
        <div class="wind-widget__row">
            <span class="wind-widget__label">Speed</span>
            <span class="wind-widget__value" id="wind-speed">-- km/h</span>
        </div>
        <div class="wind-widget__row">
            <span class="wind-widget__label">Direction</span>
            <span class="wind-widget__value" id="wind-direction">--</span>
        </div>
        <div class="wind-widget__status wind-widget__status--active" id="wind-status">
            ⚡ Generating Power
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/stations.js"></script>
    <script src="js/app.js"></script>
    <script src="js/map.js"></script>
</body>

</html>
